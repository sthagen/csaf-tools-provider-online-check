name: CI - Build and Test Service

on: [ push, pull_request ]

jobs:
  service-tests:
    name: "Test Service"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install requirements
      run: pip install --requirement backend/requirements.txt

    - name: Build and run
      run: make dev-detached

    - name: Wait for backend to be ready
      run: |
        echo "Waiting for backend health check..."
        for i in $(seq 1 60); do
          if curl -f http://0.0.0.0:48090/api/health 2>&1; then
            echo "Backend is ready!"
            exit 0
          fi
          echo "Attempt $i/60 - waiting 5s..."
          sleep 5
        done
        echo "Backend failed to become ready"
        docker compose logs --timestamps backend
        docker compose ps
        exit 1

    - name: Run Tests
      run: make run-tests-containerd

    - name: Close container
      run: make dev-stop

  devops-linters:
    name: "Lint DevOps"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Run hadolint
      run: make lint-dockerfiles

    - name: Run shellcheck
      uses: ludeeus/action-shellcheck@master
      with:
        severity: error

  check-coding-style:
      name: Check coding style
      runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install requirements
        run: pip install --requirement ./backend/requirements.txt

      - name: Check black
        run: black ./backend/src/

      - name: Check isort
        run: isort ./backend/src/

      - name: Check flake8
        run: flake8 --ignore=E501 ./backend/src/
