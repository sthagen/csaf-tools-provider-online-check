services:
  backend:
    build:
      context: ./backend
      target: dev
      args:
        - CSAF_CHECKER_VERSION=${CSAF_CHECKER_VERSION:?CSAF_CHECKER_VERSION is not set}
    container_name: backend
    ports:
      - "${PORT_BACKEND:-443}:8000"
    volumes:
      - ./backend:/app
    environment:
      - SCAN_SLOTS=${SCAN_SLOTS:-10}
      - CSAF_CHECKER_TIMEOUT=${CSAF_CHECKER_TIMEOUT:-3600}
      - DOMAIN_BLOCKLIST=${DOMAIN_BLOCKLIST:-}
      - VALIDATOR_CACHE_RESULTS=${VALIDATOR_CACHE_RESULTS:-1}
      - TASK_PAUSE_TIME_MAX_BEFORE_RESET=${TASK_PAUSE_TIME_MAX_BEFORE_RESET:-100}
      - TASK_PAUSE_TIME_INTERVAL=${TASK_PAUSE_TIME_INTERVAL:-0.2}
      - TASK_TIME_BEFORE_ORPHANED=${TASK_TIME_BEFORE_ORPHANED:-50}
      - CSAF_VALIDATOR_VERSION=${CSAF_VALIDATOR_VERSION:?CSAF_VALIDATOR_VERSION is not set}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - CACHE_TIMEOUT_SECONDS=${CACHE_TIMEOUT_SECONDS:-604800}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${CSAF_CHECKER_MEMORY_LIMIT:-500m}
    networks:
      - scanner
    depends_on:
      - valkey
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 1
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: frontend
    ports:
      - "${PORT_FRONTEND:-48091}:8080"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_FOOTER_TEXT=${FOOTER_TEXT:-}
      - VITE_BACKEND_PORT=${PORT_BACKEND:-443}
    restart: unless-stopped
    networks:
      - scanner
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://0.0.0.0:8080"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s

  validator:
    build:
      context: ./validator
      target: dev
      args:
      - CSAF_VALIDATOR_VERSION=${CSAF_VALIDATOR_VERSION:?CSAF_VALIDATOR_VERSION is not set}
    container_name: validator
    ports:
      - "${PORT_VALIDATOR:-48092}:8082"
    restart: unless-stopped
    networks:
      - scanner
    depends_on:
      - valkey
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://0.0.0.0:8082/api/v1/tests"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  valkey:
    image: valkey/valkey:8-alpine
    networks:
      - scanner
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  scanner:
    enable_ipv6: true
    ipam:
      config:
        # these must match the source ranges in dev/restrict-network.sh
        - subnet: 172.30.0.0/24
        - subnet: fd00:30::/64
