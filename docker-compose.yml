services:
  backend:
    build:
      context: ./backend
      target: dev
    container_name: backend
    ports:
      - "${PORT_BACKEND:-443}:8000"
    volumes:
      - ./backend:/app
    environment:
      - SCAN_SLOTS=${SCAN_SLOTS:-10}
      - CSAF_CHECKER_TIMEOUT=${CSAF_CHECKER_TIMEOUT:-3600}
      - DOMAIN_BLOCKLIST=${DOMAIN_BLOCKLIST:-}
      - VALIDATOR_CACHE_RESULTS=${VALIDATOR_CACHE_RESULTS:-1}
      - TASK_PAUSE_TIME_MAX_BEFORE_RESET=${TASK_PAUSE_TIME_MAX_BEFORE_RESET:-100}
      - TASK_PAUSE_TIME_INTERVAL=${TASK_PAUSE_TIME_INTERVAL:-0.2}
      - TASK_TIME_BEFORE_ORPHANED=${TASK_TIME_BEFORE_ORPHANED:-50}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${CSAF_CHECKER_MEMORY_LIMIT:-500m}
    networks:
      - scanner
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: frontend
    ports:
      - "${PORT_FRONTEND:-48091}:8080"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_FOOTER_TEXT=${FOOTER_TEXT:-}
      - VITE_BACKEND_PORT=${PORT_BACKEND:-443}
    restart: unless-stopped
    networks:
      - scanner
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  validator:
    build:
      context: ./validator
      target: dev
    container_name: validator
    ports:
      - "${PORT_VALIDATOR:-48092}:8082"
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:alpine
    networks:
      - scanner

networks:
  scanner:
    enable_ipv6: true
    ipam:
      config:
        # these must match the source ranges in dev/restrict-network.sh
        - subnet: 172.30.0.0/24
        - subnet: fd00:30::/64
