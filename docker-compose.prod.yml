services:
  backend:
    build:
      context: ./backend
      target: prod
      args:
        - CSAF_CHECKER_VERSION=${CSAF_CHECKER_VERSION:-3.4.0}
    container_name: backend
    ports:
      - "${PORT_BACKEND:-48090}:8000"
    environment:
      - SCAN_SLOTS=${SCAN_SLOTS:-10}
      - CSAF_CHECKER_TIMEOUT=${CSAF_CHECKER_TIMEOUT:-3600}
      - DOMAIN_BLOCKLIST=${DOMAIN_BLOCKLIST:-}
      - VALIDATOR_CACHE_RESULTS=${VALIDATOR_CACHE_RESULTS:-1}
      - TASK_PAUSE_TIME_MAX_BEFORE_RESET=${TASK_PAUSE_TIME_MAX_BEFORE_RESET:-100}
      - TASK_PAUSE_TIME_INTERVAL=${TASK_PAUSE_TIME_INTERVAL:-0.2}
      - TASK_TIME_BEFORE_ORPHANED=${TASK_TIME_BEFORE_ORPHANED:-50}
      - CSAF_CHECKER_VERSION=${CSAF_CHECKER_VERSION:-3.4.0}
      - CSAF_VALIDATOR_VERSION=${CSAF_VALIDATOR_VERSION:-2.0.24}
      - APP_VERSION=${APP_VERSION:-1.0.0}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${CSAF_CHECKER_MEMORY_LIMIT:-500m}
    networks:
      - scanner
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        - VITE_FOOTER_TEXT=${FOOTER_TEXT:-}
        - VITE_BACKEND_PORT=${VITE_BACKEND_PORT:-48090}
    container_name: frontend
    ports:
      - "${PORT_FRONTEND:-48091}:8080"
    restart: unless-stopped
    networks:
      - scanner
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  validator:
    build:
      context: ./validator
      target: prod
      args:
      - CSAF_VALIDATOR_VERSION=${CSAF_VALIDATOR_VERSION:-2.0.24}
    container_name: validator
    environment:
      - CSAF_VALIDATOR_VERSION=${CSAF_VALIDATOR_VERSION:-2.0.24}
    ports:
      - "${PORT_VALIDATOR:-48092}:8082"
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - scanner
    volumes:
      - redis-data:/data

volumes:
  redis-data:

networks:
  scanner:
    enable_ipv6: true
    ipam:
      config:
        # these must match the source ranges in dev/restrict-network.sh
        - subnet: 172.30.0.0/24
        - subnet: fd00:30::/64
