<MDomain check.provider.csaf.dev>
    MDRequireHttps permanent
</MDomain>
MDCertificateAgreement accepted

<IfModule mod_geoip.c>
    GeoIPEnable On
    GeoIPDBFile /usr/share/GeoIP/GeoIP.dat IndexCache
    GeoIPDBFile /usr/share/GeoIP/GeoIPv6.dat IndexCache
    # Only set the environment variables by GeoIP, the other outputs are not needed
    GeoIPOutput Env
    # When apache is behind a reverse proxy, set this option:
    #GeoIPScanProxyHeaders On
</IfModule>

<VirtualHost *:443>
    ServerName check.provider.csaf.dev

    SSLEngine on

    # Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self'; connect-src 'self'"
    <Location /api/docs>
        Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self'"
    </Location>

    # Access control
    # Edit files in contrib/blocklists/, run contrib/update-blocklists.sh, then reload Apache.
    Alias /blocked.html /srv/provider-online-check/frontend/public/blocked.html
    <Location /blocked.html>
        Require all granted
    </Location>
    ErrorDocument 403 /blocked.html
    # UA + country: SetEnvIf at vhost level, enforced by RewriteRule before mod_proxy
    RewriteEngine On
    Include /etc/apache2/conf-available/blocklist-env.conf
    RewriteCond %{ENV:blocked_ua} 1 [OR]
    RewriteCond %{ENV:blocked_country} 1
    RewriteRule ^(?!/blocked\.html) - [F]
    # CIDR: Require not ip inside <Location>, enforced by mod_authz_host
    <Location />
        Include /etc/apache2/conf-available/blocklist-cidr.conf
    </Location>

    # Backend API
    ProxyPass /blocked.html !
    ProxyPass /api http://localhost:48090/api
    ProxyPassReverse /api http://localhost:48090/api

    # Frontend (catch-all)
    ProxyPass / http://localhost:48091/
    ProxyPassReverse / http://localhost:48091/

</VirtualHost>
